version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/queries"
    schema: "./sql/migrations"
    gen:
      go:
        package: "db"
        out: "./db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        # Strip the `staff` schema prefix so the existing repository code
        # (db.Staff, db.OutboxEvent, db.TeacherProfile) keeps compiling.
        rename:
          staff_staff: "Staff"
          staff_outbox_event: "OutboxEvent"
          staff_outbox_status_enum: "OutboxStatusEnum"
          staff_teacher_profile: "TeacherProfile"
