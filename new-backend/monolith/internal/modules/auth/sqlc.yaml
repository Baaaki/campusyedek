version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/queries"
    schema: "./sql/migrations"
    gen:
      go:
        package: "db"
        out: "./db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        # Strip the auth schema prefix from generated Go names so the
        # existing repository code (db.User, db.Session, db.ProcessedEvent)
        # keeps working unchanged. Plan rule 0.1 — keep mevcut servis kalibi.
        rename:
          auth_user: "User"
          auth_session: "Session"
          auth_processed_event: "ProcessedEvent"
          auth_outbox_event: "OutboxEvent"
          auth_outbox_status_enum: "OutboxStatusEnum"
