version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql/queries"
    schema: "./sql/migrations"
    gen:
      go:
        package: "db"
        out: "./db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        rename:
          AttendanceStudentsView: "StudentView"
          AttendanceCoursesView: "CourseView"
          AttendanceEnrollmentsView: "EnrollmentView"
          AttendanceAttendanceSession: "AttendanceSession"
          AttendanceAttendanceRecord: "AttendanceRecord"
          AttendanceAcademicPeriod: "AcademicPeriod"
          AttendanceOutboxEvent: "OutboxEvent"
          AttendanceProcessedEvent: "ProcessedEvent"
          AttendanceSessionTypeEnum: "SessionTypeEnum"
          AttendanceOutboxStatusEnum: "OutboxStatusEnum"
