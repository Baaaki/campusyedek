version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        rename:
          grades.students_view: "StudentView"
          grades.courses_view: "CourseView"
          grades.prerequisite_courses_view: "PrerequisiteCourseView"
          grades.student_course_registrations: "StudentCourseRegistration"
          grades.student_assessment_scores: "StudentAssessmentScore"
          grades.student_completed_courses: "StudentCompletedCourse"
          grades.outbox_events: "OutboxEvent"
          grades.grading_type_enum: "GradingTypeEnum"
          grades.grade_point_enum: "GradePointEnum"
          grades.outbox_status_enum: "OutboxStatusEnum"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "pg_catalog.varchar"
            go_type: "string"
