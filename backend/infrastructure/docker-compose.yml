# Docker Compose configuration for MyDreamCampus infrastructure
#
# Services:
# - PostgreSQL (databases for each microservice)
# - RabbitMQ (message broker)
# - Redis (cache) - NOT STARTED by default, uncomment when needed
#
# Usage:
#   docker-compose up -d         # Start all services
#   docker-compose down          # Stop all services
#   docker-compose logs -f       # View logs

version: '3.9'

services:
  # PostgreSQL - Auth Service Database
  postgres-auth:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: mydreamcampus_auth
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Staff Service Database
  postgres-staff:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-staff
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_STAFF_PASSWORD}
      POSTGRES_DB: mydreamcampus_staff
    volumes:
      - postgres_staff_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Student Service Database
  postgres-student:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-student
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_STUDENT_PASSWORD}
      POSTGRES_DB: mydreamcampus_student
    volumes:
      - postgres_student_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Catalog Service Database
  postgres-catalog:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-catalog
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_CATALOG_PASSWORD}
      POSTGRES_DB: mydreamcampus_catalog
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Enrollment Service Database
  postgres-enrollment:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-enrollment
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ENROLLMENT_PASSWORD}
      POSTGRES_DB: mydreamcampus_enrollment
    volumes:
      - postgres_enrollment_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Attendance Service Database
  postgres-attendance:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-attendance
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ATTENDANCE_PASSWORD}
      POSTGRES_DB: mydreamcampus_attendance
    volumes:
      - postgres_attendance_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Grades Service Database
  postgres-grades:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-grades
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_GRADES_PASSWORD}
      POSTGRES_DB: mydreamcampus_grades
    volumes:
      - postgres_grades_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Meal Service Database
  postgres-meal:
    image: postgres:18-alpine
    container_name: mydreamcampus-postgres-meal
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_MEAL_PASSWORD}
      POSTGRES_DB: mydreamcampus_meal
    volumes:
      - postgres_meal_data:/var/lib/postgresql/data
    ports:
      - "5439:5432"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: mydreamcampus-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - Cache
  redis:
    image: redis:7.2-alpine
    container_name: mydreamcampus-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - mydreamcampus-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Traefik - API Gateway / Reverse Proxy
  traefik:
    image: traefik:v3.2
    container_name: mydreamcampus-traefik
    restart: unless-stopped
    ports:
      - "80:80" # HTTP
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_logs:/var/log/traefik
    networks:
      - mydreamcampus-network
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host machine
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mydreamcampus-network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_staff_data:
  postgres_student_data:
  postgres_catalog_data:
  postgres_enrollment_data:
  postgres_attendance_data:
  postgres_grades_data:
  postgres_meal_data:
  rabbitmq_data:
  redis_data:
  traefik_logs:


