openapi: 3.0.3
info:
  title: MyDreamCampus API
  description: |
    Üniversite yönetim sistemi API dokümantasyonu.

    Tüm API'ler Traefik gateway üzerinden `http://localhost/api/...` şeklinde erişilir.

    ## Kimlik Doğrulama
    - `POST /api/auth/login` ile JWT token alınır
    - Token `Authorization: Bearer <token>` header'ı ile gönderilir
    - Traefik forward-auth middleware'i token'ı doğrular ve `X-User-ID`, `X-User-Role`, `X-User-Department` header'larını backend servislere iletir
    - Refresh token HttpOnly cookie olarak saklanır

    ## Roller
    - **admin**: Tam yetki
    - **teacher**: Ders, yoklama, not yönetimi
    - **student**: Kayıt, yoklama, not görüntüleme

    ## Rate Limiting
    Tüm endpoint'ler rate limiting ile korunur. Yanıt header'ları:
    - `X-RateLimit-Limit`: Zaman penceresi başına izin verilen maksimum istek sayısı
    - `X-RateLimit-Remaining`: Kalan istek sayısı
    - `X-RateLimit-Reset`: Limit sıfırlanma zamanı (Unix epoch saniye)

    Limit aşıldığında `429 Too Many Requests` döner.

    ## Hata Yönetimi
    Tüm endpoint'ler aşağıdaki genel hata yanıtlarını dönebilir:
    - `401 Unauthorized`: Geçersiz veya eksik JWT token
    - `429 Too Many Requests`: Rate limit aşıldı
    - `500 Internal Server Error`: Beklenmeyen sunucu hatası

    Hata yanıtları her zaman `ErrorResponse` formatındadır.

    ## Sağlık Kontrolü
    Her servis `GET /health` endpoint'i sunar. Bu endpoint'ler kimlik doğrulama gerektirmez.
  version: 1.0.0
  contact:
    name: MyDreamCampus Team

servers:
  - url: http://localhost
    description: Traefik Gateway (Development)

tags:
  - name: Auth
    description: Kimlik doğrulama ve oturum yönetimi (port 8001)
  - name: Staff
    description: Personel/öğretim üyesi yönetimi (port 8002)
  - name: Students
    description: Öğrenci yönetimi (port 8003)
  - name: Catalog
    description: Ders kataloğu yönetimi (port 8004)
  - name: Semesters
    description: Dönem ve dönem dersleri yönetimi (port 8004)
  - name: Enrollment
    description: Ders kayıt ve onay işlemleri (port 8005)
  - name: Attendance
    description: Yoklama yönetimi (port 8006)
  - name: Grades
    description: Not yönetimi ve transkript (port 8007)
  - name: Meals
    description: Yemekhane ve rezervasyon yönetimi (port 8008)
  - name: Health
    description: Servis sağlık kontrol endpoint'leri

security:
  - BearerAuth: []

paths:
  # ============================================================
  # HEALTH CHECKS
  # ============================================================
  /api/auth/health:
    get:
      operationId: healthAuth
      tags: [Health]
      summary: Auth servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/staff/health:
    get:
      operationId: healthStaff
      tags: [Health]
      summary: Staff servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/students/health:
    get:
      operationId: healthStudent
      tags: [Health]
      summary: Student servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/catalog/health:
    get:
      operationId: healthCatalog
      tags: [Health]
      summary: Catalog servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/enrollment/health:
    get:
      operationId: healthEnrollment
      tags: [Health]
      summary: Enrollment servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/attendance/health:
    get:
      operationId: healthAttendance
      tags: [Health]
      summary: Attendance servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/grades/health:
    get:
      operationId: healthGrades
      tags: [Health]
      summary: Grades servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/meals/health:
    get:
      operationId: healthMeal
      tags: [Health]
      summary: Meal servisi sağlık kontrolü
      security: []
      responses:
        "200":
          description: Servis sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ============================================================
  # AUTH SERVICE
  # ============================================================
  /api/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Giriş yap
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Başarılı giriş
          headers:
            Set-Cookie:
              description: refresh_token HttpOnly cookie
              schema:
                type: string
            X-RateLimit-Limit:
              description: Zaman penceresi başına izin verilen maksimum istek sayısı
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Kalan istek sayısı
              schema:
                type: integer
            X-RateLimit-Reset:
              description: Limit sıfırlanma zamanı (Unix epoch saniye)
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Token yenile
      description: HttpOnly cookie'deki refresh token ile yeni access token alır.
      security: []
      responses:
        "200":
          description: Yeni access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Çıkış yap
      description: Mevcut oturumu sonlandırır ve token'ı blacklist'e ekler.
      responses:
        "200":
          description: Başarılı çıkış
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout-all:
    post:
      operationId: logoutAll
      tags: [Auth]
      summary: Tüm oturumlardan çıkış
      description: Kullanıcının tüm aktif oturumlarını sonlandırır.
      responses:
        "200":
          description: Tüm oturumlar sonlandırıldı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/change-password:
    post:
      operationId: changePassword
      tags: [Auth]
      summary: Şifre değiştir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Şifre değiştirildi, yeni token döner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/sessions:
    get:
      operationId: listSessions
      tags: [Auth]
      summary: Aktif oturumları listele
      responses:
        "200":
          description: Oturum listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResponse"

  /api/auth/sessions/{id}:
    delete:
      operationId: deleteSession
      tags: [Auth]
      summary: Belirli bir oturumu sonlandır
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Oturum sonlandırıldı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/auth/verify:
    get:
      operationId: verifyToken
      tags: [Auth]
      summary: Token doğrula (Traefik forward-auth)
      description: |
        Traefik tarafından her istekte çağrılır.
        Başarılıysa X-User-ID, X-User-Role, X-User-Department header'ları döner.
      responses:
        "200":
          description: Token geçerli
          headers:
            X-User-ID:
              schema:
                type: string
                format: uuid
            X-User-Role:
              schema:
                type: string
                enum: [admin, teacher, student]
            X-User-Department:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # STAFF SERVICE
  # ============================================================
  /api/staff:
    get:
      operationId: listStaff
      tags: [Staff]
      summary: Personel listele
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Personel listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffListResponse"

    post:
      operationId: createStaff
      tags: [Staff]
      summary: Yeni personel oluştur
      description: Sadece admin yetkisi gerektirir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Personel oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/staff/{id}:
    get:
      operationId: getStaff
      tags: [Staff]
      summary: Personel detayı
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Personel bilgileri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateStaff
      tags: [Staff]
      summary: Personel güncelle
      description: Sadece admin yetkisi gerektirir.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStaffRequest"
      responses:
        "200":
          description: Personel güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteStaff
      tags: [Staff]
      summary: Personeli pasifleştir
      description: Soft delete. Sadece admin yetkisi gerektirir.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Personel pasifleştirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/staff/{id}/profile:
    put:
      operationId: updateTeacherProfile
      tags: [Staff]
      summary: Öğretim üyesi profilini güncelle
      description: Akademik profil bilgilerini günceller (eğitim, makaleler, projeler vb.).
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeacherProfileRequest"
      responses:
        "200":
          description: Profil güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/staff/profile/{id}:
    get:
      operationId: getTeacherProfile
      tags: [Staff]
      summary: Öğretim üyesi profili görüntüle
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Öğretim üyesi profili
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /public/teachers:
    get:
      operationId: listTeacherProfilesPublic
      tags: [Staff]
      summary: Öğretim üyelerini listele (herkese açık)
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Öğretim üyesi profil listesi
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeacherProfileResponse"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /public/teachers/{id}:
    get:
      operationId: getTeacherProfilePublic
      tags: [Staff]
      summary: Öğretim üyesi profili (herkese açık)
      security: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Öğretim üyesi profili
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherProfileResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # STUDENT SERVICE
  # ============================================================
  /api/students:
    get:
      operationId: listStudents
      tags: [Students]
      summary: Öğrenci listele
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: department
          in: query
          schema:
            type: string
        - name: class_level
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 6
        - name: status
          in: query
          schema:
            type: string
            enum: [active, graduated, suspended, withdrawn]
        - name: advisor_id
          in: query
          schema:
            type: string
            format: uuid
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [student_number, last_name, enrollment_year, class_level, created_at]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Öğrenci listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"

    post:
      operationId: createStudent
      tags: [Students]
      summary: Yeni öğrenci oluştur
      description: Sadece admin yetkisi gerektirir.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Öğrenci oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/students/{id}:
    get:
      operationId: getStudent
      tags: [Students]
      summary: Öğrenci detayı
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Öğrenci bilgileri
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateStudent
      tags: [Students]
      summary: Öğrenci güncelle
      description: Sadece admin yetkisi gerektirir.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Öğrenci güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteStudent
      tags: [Students]
      summary: Öğrenciyi pasifleştir
      description: Soft delete. Sadece admin yetkisi gerektirir.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Öğrenci pasifleştirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/students/search:
    post:
      operationId: searchStudents
      tags: [Students]
      summary: Öğrenci ara
      description: Full-text arama ve filtreleme ile öğrenci arar. Cursor-based pagination kullanır.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchStudentsRequest"
      responses:
        "200":
          description: Arama sonuçları
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchStudentsResponse"

  /api/students/my-advisees:
    get:
      operationId: listMyAdvisees
      tags: [Students]
      summary: Danışman öğrencilerimi listele
      description: teacher veya admin rolü gerektirir.
      responses:
        "200":
          description: Danışman öğrenci listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyAdviseesResponse"

  /api/students/orphaned:
    get:
      operationId: listOrphanedStudents
      tags: [Students]
      summary: Danışmansız öğrencileri listele
      description: Sadece admin yetkisi gerektirir.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Danışmansız öğrenci listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"

  /api/students/bulk-advisor-assign:
    put:
      operationId: bulkAdvisorAssign
      tags: [Students]
      summary: Toplu danışman atama
      description: Birden fazla öğrenciye aynı anda danışman atar. Sadece admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAdvisorAssignRequest"
      responses:
        "200":
          description: Toplu atama sonucu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAdvisorAssignResponse"

  /api/students/bulk-import:
    post:
      operationId: bulkImportStudents
      tags: [Students]
      summary: CSV ile toplu öğrenci aktarımı
      description: |
        CSV dosyası yükleyerek toplu öğrenci oluşturur. Asenkron çalışır. Sadece admin.

        **Dosya kısıtlamaları:**
        - Format: `text/csv` (UTF-8 encoding)
        - Maksimum boyut: 5 MB
        - Zorunlu sütunlar: `student_number, first_name, last_name, email, faculty, department, enrollment_year, class_level, advisor_id`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV dosyası (max 5MB, text/csv)
      responses:
        "202":
          description: İmport işi oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      operationId: listImportJobs
      tags: [Students]
      summary: İmport işlerini listele
      description: Sadece admin.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, completed, failed]
      responses:
        "200":
          description: İmport iş listesi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobListResponse"

  /api/students/bulk-import/{job_id}:
    get:
      operationId: getImportJob
      tags: [Students]
      summary: İmport iş durumu
      description: Sadece admin.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: İmport iş detayı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJobResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # COURSE CATALOG SERVICE
  # ============================================================
  /api/catalog/courses:
    get:
      operationId: listCourses
      tags: [Catalog]
      summary: Ders kataloğunu listele
      security: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: faculty
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: course_type
          in: query
          schema:
            type: string
            enum: [mandatory, elective]
        - name: course_category
          in: query
          schema:
            type: string
            enum: [theoretical, practical, internship, project, seminar]
        - name: education_level
          in: query
          schema:
            type: string
            enum: [undergraduate, graduate, doctorate]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, draft, pending_approval, under_revision, archived, suspended]
        - name: class_level
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 6
        - name: semester
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 8
        - name: language
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Ders adı veya kodu ile arama
          schema:
            type: string
      responses:
        "200":
          description: Ders listesi
          content:
            application/json:
