# Traefik Static Configuration
#
# This is the main configuration file for Traefik v3.2
#
# Documentation: https://doc.traefik.io/traefik/

# API and Dashboard
# In production, access dashboard via authenticated route defined in dynamic.yml
api:
  dashboard: true
  insecure: false

# Health check endpoint
ping:
  entryPoint: "web"

# Entry Points
entryPoints:
  web:
    address: ":80"
    # NOTE: HTTPS redirect disabled for local development (no SSL cert).
    # In production, uncomment the block below:
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
    #       permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        # In production, configure certResolver or provide certificates:
        # certResolver: letsencrypt
        # Or use file-based certificates in dynamic.yml:
        # tls:
        #   certificates:
        #     - certFile: /etc/traefik/certs/cert.pem
        #       keyFile: /etc/traefik/certs/key.pem
        {}

# Certificate Resolvers (uncomment for Let's Encrypt in production)
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: admin@mydreamcampus.com
#       storage: /etc/traefik/acme.json
#       httpChallenge:
#         entryPoint: web

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: app-network
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Logging
log:
  level: INFO  # DEBUG, INFO, WARN, ERROR, FATAL, PANIC

# Access Logs
accessLog:
  filePath: /var/log/traefik/access.log
  format: json

