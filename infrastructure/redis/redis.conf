# Redis Configuration
#
# Documentation: https://redis.io/docs/latest/operate/oss_and_stack/management/config/
#
# This configuration file is mounted to /usr/local/etc/redis/redis.conf

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize no
supervised no
loglevel notice
databases 16

# Snapshotting (Persistence)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
# replicaof <masterip> <masterport>

# Security
# requirepass yourpassword
# maxclients 10000

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append Only File (AOF)
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128
